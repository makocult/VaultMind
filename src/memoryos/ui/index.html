<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VaultMind Console</title>
    <link rel="stylesheet" href="/console/assets/console.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">VaultMind</p>
          <h1>Memory Console</h1>
          <p class="lede">轻量管理不同 Agent 的记忆，只做导入、浏览、编辑和删除。</p>
        </div>

        <section class="panel stack">
          <div class="panel-title-row">
            <h2>Agent</h2>
            <span class="status-dot" id="connection-dot"></span>
          </div>
          <label class="field">
            <span>当前 Agent</span>
            <select id="agent-select"></select>
          </label>
          <label class="field hidden" id="api-key-row">
            <span>API Key</span>
            <input id="api-key-input" type="password" placeholder="仅在严格模式下需要" />
          </label>
          <p class="hint" id="auth-hint">正在读取连接模式…</p>
          <div class="button-row">
            <button id="new-memory" class="button button-primary" type="button">手动导入</button>
            <button id="refresh-overview" class="button button-secondary" type="button">刷新</button>
          </div>
        </section>

        <section class="panel stack">
          <h2>概览</h2>
          <div class="stat-list">
            <div class="stat-item">
              <span>服务</span>
              <strong id="metric-service">-</strong>
            </div>
            <div class="stat-item">
              <span>默认 Agent</span>
              <strong id="metric-default-agent">-</strong>
            </div>
            <div class="stat-item">
              <span>已提交记忆</span>
              <strong id="metric-memories">-</strong>
            </div>
            <div class="stat-item">
              <span>存储位置</span>
              <strong id="metric-data-root">-</strong>
            </div>
          </div>
        </section>
      </aside>

      <main class="main">
        <header class="hero panel">
          <div>
            <p class="eyebrow">Minimal Console</p>
            <h2>记忆管理台</h2>
            <p id="ready-summary" class="hero-copy">正在读取服务状态…</p>
          </div>
        </header>

        <section class="panel toolbar">
          <div class="toolbar-main">
            <label class="field field-grow">
              <span>搜索记忆</span>
              <input id="memory-query" type="text" placeholder="按 summary、body、tags、entities 搜索" />
            </label>
            <label class="field field-compact">
              <span>类型</span>
              <select id="memory-type-filter">
                <option value="">全部</option>
                <option value="semantic">semantic</option>
                <option value="relational">relational</option>
                <option value="opinion">opinion</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button id="list-memories" class="button button-secondary" type="button">查询</button>
            <button id="clear-filters" class="button button-secondary" type="button">清空筛选</button>
          </div>
        </section>

        <section class="workspace">
          <section class="panel list-panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">Memories</p>
                <h2>记忆列表</h2>
              </div>
              <span id="memory-count" class="badge">0 条</span>
            </div>
            <div id="memory-list" class="list-column empty-state">当前还没有记忆。</div>
          </section>

          <section class="panel editor-panel">
            <div class="panel-title-row">
              <div>
                <p class="eyebrow">Editor</p>
                <h2 id="editor-title">手动导入</h2>
              </div>
              <span id="editor-status" class="badge badge-soft">新建</span>
            </div>

            <form id="memory-form" class="editor-form">
              <label class="field field-span-2">
                <span>摘要</span>
                <input id="form-summary" type="text" placeholder="一句话概括这条记忆" required />
              </label>

              <label class="field">
                <span>类型</span>
                <select id="form-memory-type">
                  <option value="semantic">semantic</option>
                  <option value="relational">relational</option>
                  <option value="opinion">opinion</option>
                </select>
              </label>

              <label class="field">
                <span>Session</span>
                <input id="form-session-id" type="text" placeholder="例如 hermes_session" />
              </label>

              <label class="field">
                <span>时间</span>
                <input id="form-timestamp" type="datetime-local" />
              </label>

              <label class="field">
                <span>来源</span>
                <input id="form-source-type" type="text" placeholder="默认 console-import" />
              </label>

              <label class="field field-span-2">
                <span>标签</span>
                <input id="form-tags" type="text" placeholder="例如 hermes, 约束, 风格" />
              </label>

              <label class="field field-span-2">
                <span>实体</span>
                <input id="form-entities" type="text" placeholder="例如 Hermes, VaultMind" />
              </label>

              <label class="field field-span-2">
                <span>正文</span>
                <textarea id="form-body" rows="10" placeholder="把要保存的内容贴进来"></textarea>
              </label>

              <div class="button-row field-span-2">
                <button id="save-memory" class="button button-primary" type="submit">保存</button>
                <button id="reset-editor" class="button button-secondary" type="button">清空</button>
                <button id="delete-memory" class="button button-danger" type="button">删除</button>
              </div>
            </form>

            <article id="memory-detail" class="detail-card">
              <p class="detail-empty">选择左侧记忆后，这里会显示它的时间、类型、标签和正文概览。</p>
            </article>
          </section>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/console/assets/console.js"></script>
  </body>
</html>
